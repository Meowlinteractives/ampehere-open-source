<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png" type="image/png">
    <title>Ampehere · Daily Spin</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="/style.css">
    <style>
    /* === THEME OVERRIDE === */
    :root {
        --bg:#060606; --surface:#0c0c0c; --surface2:#0a0a0a;
        --border:#1a1a1a; --border-hi:#252525;
        --blue:#2563c4; --blue-hi:#3b7de0;
        --text:#d0d8e0; --text-muted:#8899aa; --text-dim:#556677;
        --red:#c0392b; --red-hover:#e74c3c; --red-dark:#922b21;
        --gold:#f1c40f; --green:#27ae60;
        --accent:#c0392b; --accent2:#8899aa;
    }
    *, *::before, *::after { border-radius: 0 !important; }
    body { background: #060606 !important; background-image: none !important; }
    a { color: #2563c4 !important; }
    a:hover { color: #3b7de0 !important; }
    </style>
    <style>
        :root { --bg:#060606; --surface:#0c0c0c; --border:#1a1a1a; --border-hi:#252525; --blue:#2563c4; --blue-hi:#3b7de0; --text:#d0d8e0; --text-muted:#8899aa; --text-dim:#556677; --red:#c0392b; --gold:#f1c40f; --green:#27ae60; }
        *, *::before, *::after { border-radius: 0 !important; }
        body { background: #060606 !important; background-image: none !important; color: #d0d8e0; }
        a { color: #2563c4; } a:hover { color: #3b7de0; }
    </style>
    <style>
        :root {
            --bg:       #050505;
            --surface:  rgba(8,8,8,0.97);
            --border:   rgba(100,160,220,0.18);
            --accent:   #4d9de0;
            --accent2:  #8899aa;
            --gold:     #f0c060;
            --gold2:    #ffd97d;
            --text:     #dde8f5;
            --muted:    #4a6a8a;
            --green:    #50d890;
            --red:      #e05555;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 70% 50% at 10% 0%,  rgba(15,15,15,.22) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 100%, rgba(77,157,224,.10) 0%, transparent 55%);
            background-attachment: fixed;
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 1.5rem 1rem 3rem;
            overflow-x: hidden;
        }

        /* ── Page layout ── */
        .page-wrap { width:100%; max-width:480px; }

        .page-header {
            text-align: center;
            margin-bottom: 1.5rem;
            animation: fadeUp .4s ease-out both;
        }
        .page-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: .08em;
            text-transform: uppercase;
            line-height: 1;
        }
        .page-title span { color: var(--gold); }
        .page-sub {
            font-size: .75rem;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: .12em;
            text-transform: uppercase;
            margin-top: .4rem;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0;
            padding: 1.5rem;
            box-shadow: 0 24px 64px rgba(0,0,0,.5);
            animation: fadeUp .45s ease-out .05s both;
        }

        /* ── Balance bar ── */
        .balance-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(77,157,224,.08);
            border: 1px solid rgba(77,157,224,.18);
            border-radius: 0;
            padding: .65rem 1rem;
            margin-bottom: 1.5rem;
        }
        .bal-label { font-size: .7rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
        .bal-val   { font-family: 'Exo 2', sans-serif; font-size: 1.35rem; font-weight: 700; color: var(--text); }
        .bal-coin  { width: 1.3em; height: 1.3em; object-fit: contain; vertical-align: middle; }

        /* ── Wheel canvas ── */
        .wheel-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 1.25rem;
            position: relative;
        }
        #wheelCanvas {
            display: block;
            cursor: pointer;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,.5));
            max-width: 100%;
            height: auto;
        }
        #wheelCanvas.busy { cursor: not-allowed; }

        /* ── Spin button ── */
        .spin-btn {
            width: 100%;
            padding: .95rem;
            background: linear-gradient(135deg, #1c1c1c, #1a3a70);
            border: 1px solid rgba(77,157,224,.4);
            border-radius: 0;
            color: #c0d8f0;
            font-family: 'Exo 2', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
        }
        .spin-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #3a62a8, #2a4a80);
            border-color: rgba(77,157,224,.65);
            color: #e0f0ff;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(15,15,15,.4);
        }
        .spin-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

        /* ── Cooldown banner ── */
        .cooldown-bar {
            display: none;
            align-items: center;
            justify-content: space-between;
            margin-top: .85rem;
            padding: .65rem 1rem;
            background: rgba(77,157,224,.07);
            border: 1px solid rgba(77,157,224,.15);
            border-radius: 0;
            font-size: .8rem;
            font-weight: 700;
            color: var(--muted);
        }
        .cooldown-bar.show { display: flex; }
        .cooldown-time {
            font-family: 'Exo 2', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent2);
            letter-spacing: .05em;
        }

        /* ── Error banner ── */
        .err-bar {
            display: none;
            margin-top: .85rem;
            padding: .65rem 1rem;
            background: rgba(220,60,60,.1);
            border: 1px solid rgba(220,60,60,.25);
            border-radius: 0;
            font-size: .82rem;
            font-weight: 700;
            color: #ee8888;
            text-align: center;
        }
        .err-bar.show { display: block; }

        /* ── Result panel ── */
        .result-panel {
            display: none;
            margin-top: 1rem;
            padding: 1.5rem 1.25rem 1.25rem;
            border-radius: 0;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(77,157,224,.2);
            background: rgba(10,22,44,.6);
        }
        .result-panel.show { display: block; animation: fadeUp .35s ease-out; }
        .result-panel.win  { border-color: rgba(240,192,96,.35); background: rgba(20,16,4,.6); }
        .result-panel.jackpot { border-color: rgba(220,60,220,.5); background: rgba(20,4,20,.6); }

        .result-emoji { font-size: 3rem; display: block; margin-bottom: .5rem; animation: pop .4s ease-out; }
        .result-title {
            font-family: 'Exo 2', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: .25rem;
        }
        .result-panel.win .result-title { color: var(--gold); }
        .result-panel.jackpot .result-title { color: #e070ff; }
        .result-sub { font-size: .8rem; font-weight: 700; color: var(--muted); }

        /* ── Odds table ── */
        .divider {
            display: flex; align-items: center; gap: .75rem;
            margin: 1.5rem 0 .85rem;
        }
        .div-line  { flex:1; height:1px; background: var(--border); }
        .div-label { font-size: .65rem; font-weight: 800; color: var(--muted); letter-spacing: .14em; text-transform: uppercase; white-space: nowrap; }

        .odds-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .4rem;
        }
        .odds-row {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .45rem .7rem;
            border-radius: 0;
            background: rgba(10,22,44,.4);
            border: 1px solid rgba(100,160,220,.08);
        }
        .odds-dot {
            width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
            border: 1.5px solid rgba(255,255,255,.15);
        }
        .odds-label { font-size: .75rem; font-weight: 700; color: var(--text); flex:1; }
        .odds-pct   { font-size: .72rem; font-weight: 800; color: var(--muted); }
        .odds-pct.uncommon { color: #f0a040; }
        .odds-pct.rare     { color: #e060ff; }

        /* ── Particle effects ── */
        .particle {
            position: fixed; pointer-events: none; z-index: 9999;
            font-size: 1.4rem;
            animation: particle-fall 1.1s ease-in forwards;
        }
        @keyframes particle-fall {
            0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(140px) rotate(540deg) scale(.5); opacity: 0; }
        }

        /* ── Animations ── */
        @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
        @keyframes pop    { 0% { transform:scale(.6); opacity:0; } 70%{transform:scale(1.15);} 100%{transform:scale(1);opacity:1;} }
        @keyframes spin-ring { to { transform: rotate(360deg); } }

        .ring-loader {
            width: 16px; height: 16px;
            border: 2.5px solid rgba(192,216,240,.25);
            border-top-color: #8899aa;
            border-radius: 50%;
            display: inline-block;
            animation: spin-ring .5s linear infinite;
        }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            .page-title { font-size: 2rem; }
            .card { padding: 1.1rem; }
            #wheelCanvas { width: 280px !important; height: 308px !important; }
            .odds-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 380px) {
            #wheelCanvas { width: 240px !important; height: 264px !important; }
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="page-header">
        <div class="page-title">Daily <span>Spin</span></div>
        <div class="page-sub">One free spin every 24 hours</div>
    </div>

    <div class="card">
        <div class="balance-bar">
            <span class="bal-label"><img class="bal-coin" src="/images/coin-icon.png" alt=""> Balance</span>
            <span class="bal-val" id="balVal">—</span>
        </div>

        <div class="wheel-wrap">
            <canvas id="wheelCanvas" width="400" height="440"></canvas>
        </div>

        <button class="spin-btn" id="spinBtn" onclick="doSpin()">
            <i class="fas fa-sync-alt"></i> Spin the Wheel
        </button>

        <div class="cooldown-bar" id="cooldownBar">
            <span><i class="fas fa-clock" style="margin-right:.4rem;opacity:.6;"></i>Next spin in</span>
            <span class="cooldown-time" id="cooldownTime">—</span>
        </div>

        <div class="err-bar" id="errBar"></div>

        <div class="result-panel" id="resultPanel">
            <span class="result-emoji" id="rEmoji"></span>
            <div class="result-title" id="rTitle"></div>
            <div class="result-sub"   id="rSub"></div>
        </div>

        <div class="divider">
            <div class="div-line"></div>
            <div class="div-label">Prize Odds</div>
            <div class="div-line"></div>
        </div>

        <div class="odds-grid">
            <div class="odds-row"><div class="odds-dot" style="background:#080808"></div><span class="odds-label">Nothing</span><span class="odds-pct">40%</span></div>
            <div class="odds-row"><div class="odds-dot" style="background:#111111"></div><span class="odds-label">10 Coins</span><span class="odds-pct">25%</span></div>
            <div class="odds-row"><div class="odds-dot" style="background:#181818"></div><span class="odds-label">25 Coins</span><span class="odds-pct">15%</span></div>
            <div class="odds-row"><div class="odds-dot" style="background:#4d9de0"></div><span class="odds-label">50 Coins</span><span class="odds-pct">10%</span></div>
            <div class="odds-row"><div class="odds-dot" style="background:#f0c060"></div><span class="odds-label">100 Coins</span><span class="odds-pct uncommon">7%</span></div>
            <div class="odds-row"><div class="odds-dot" style="background:#ffd97d"></div><span class="odds-label">250 Coins</span><span class="odds-pct uncommon">2.5%</span></div>
            <div class="odds-row" style="grid-column:1/-1"><div class="odds-dot" style="background:#9b30d0"></div><span class="odds-label">⭐ Ampere+</span><span class="odds-pct rare">0.5%</span></div>
        </div>
    </div>
</div>

<script src="/sidebar.js"></script>
<script>
// ── Segments (must mirror server weights exactly) ──────────────────
const SEGS = [
    { label:'Nothing',   type:'nothing',    value:0,   weight:4000, bg:'#080808', fg:'#6a8aaa' },
    { label:'10 Coins',  type:'coins',      value:10,  weight:2500, bg:'#111111', fg:'#8899aa' },
    { label:'25 Coins',  type:'coins',      value:25,  weight:1500, bg:'#181818', fg:'#c0d8f0' },
    { label:'50 Coins',  type:'coins',      value:50,  weight:1000, bg:'#4d9de0', fg:'#fff'    },
    { label:'100 Coins', type:'coins',      value:100, weight:700,  bg:'#f0c060', fg:'#1a1000' },
    { label:'250 Coins', type:'coins',      value:250, weight:250,  bg:'#ffd97d', fg:'#1a1000' },
    { label:'Ampere+',   type:'ampereplus', value:0,   weight:50,   bg:'#9b30d0', fg:'#f0d0ff' },
];
const TOTAL_W = 10000;

// ── Canvas geometry ────────────────────────────────────────────────
const canvas    = document.getElementById('wheelCanvas');
const ctx       = canvas.getContext('2d');
const W         = 400, H = 440;
const PTR_TIP_Y = 30, R = 196;
const CX = W / 2, CY = PTR_TIP_Y + R;   // 200, 226

// Build arc table
const arcs = [];
(function() {
    let cum = 0;
    for (const seg of SEGS) {
        const span = (seg.weight / TOTAL_W) * Math.PI * 2;
        arcs.push({ seg, start:cum, span, mid:cum + span/2 });
        cum += span;
    }
}());

// ── Drawing ────────────────────────────────────────────────────────
function drawFrame(rot) {
    ctx.clearRect(0, 0, W, H);

    // Slices
    for (const { seg, start, span } of arcs) {
        const a0 = start + rot, a1 = a0 + span;

        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.arc(CX, CY, R, a0, a1);
        ctx.closePath();
        ctx.fillStyle = seg.bg;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,.08)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        const mid = a0 + span / 2;
        const lr  = R * 0.63;
        ctx.save();
        ctx.translate(CX + Math.cos(mid) * lr, CY + Math.sin(mid) * lr);
        ctx.rotate(mid + Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle   = seg.fg;
        ctx.shadowColor = 'rgba(0,0,0,.6)';
        ctx.shadowBlur  = 4;
        ctx.font = 'bold ' + (seg.label.length > 8 ? 10 : 12) + 'px "Exo 2", sans-serif';
        ctx.fillText(seg.label, 0, 0);
        ctx.restore();
    }

    // Outer rings
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(77,157,224,.15)'; ctx.lineWidth = 8; ctx.stroke();
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(77,157,224,.5)';  ctx.lineWidth = 2; ctx.stroke();

    // Glow behind hub
    const grd = ctx.createRadialGradient(CX, CY, 0, CX, CY, 28);
    grd.addColorStop(0, 'rgba(77,157,224,.6)');
    grd.addColorStop(1, 'rgba(77,157,224,0)');
    ctx.beginPath(); ctx.arc(CX, CY, 28, 0, Math.PI*2);
    ctx.fillStyle = grd; ctx.fill();

    // Hub
    ctx.beginPath(); ctx.arc(CX, CY, 20, 0, Math.PI*2);
    ctx.fillStyle   = '#060606'; ctx.fill();
    ctx.strokeStyle = 'rgba(77,157,224,.7)'; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.fillStyle   = '#4d9de0';
    ctx.font        = 'bold 13px "Exo 2"';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('★', CX, CY);
    ctx.textBaseline = 'alphabetic';

    // Pointer triangle (tip at 12 o'clock)
    const TX = CX, TY = PTR_TIP_Y;
    const BW = 14, BY = 2;

    // Shadow
    ctx.beginPath();
    ctx.moveTo(TX, TY+4); ctx.lineTo(TX-BW, BY+4); ctx.lineTo(TX+BW, BY+4);
    ctx.closePath();
    ctx.fillStyle = 'rgba(0,0,0,.3)'; ctx.fill();

    // Body gradient
    const pGrd = ctx.createLinearGradient(TX-BW, BY, TX+BW, TY);
    pGrd.addColorStop(0, '#8899aa');
    pGrd.addColorStop(1, '#4d9de0');
    ctx.beginPath();
    ctx.moveTo(TX, TY); ctx.lineTo(TX-BW, BY); ctx.lineTo(TX+BW, BY);
    ctx.closePath();
    ctx.fillStyle   = pGrd;
    ctx.strokeStyle = 'rgba(255,255,255,.3)';
    ctx.lineWidth   = 1.5;
    ctx.fill(); ctx.stroke();
}

// ── Animation state ────────────────────────────────────────────────
let rot  = 0;
let busy = false;
let raf  = null;

function cancelRAF() { if (raf !== null) { cancelAnimationFrame(raf); raf = null; } }

function runIdle() {
    cancelRAF();
    (function tick() { rot += 0.003; drawFrame(rot); raf = requestAnimationFrame(tick); }());
}

drawFrame(rot);
runIdle();

// ── Target computation ─────────────────────────────────────────────
function computeTarget(segIdx) {
    const TWO_PI   = Math.PI * 2;
    const arcMid   = arcs[segIdx].mid;
    const halfSpan = arcs[segIdx].span / 2;

    let ideal = -Math.PI / 2 - arcMid;
    ideal -= (Math.random() * 2 - 1) * halfSpan * 0.3;
    ideal  = ((ideal % TWO_PI) + TWO_PI) % TWO_PI;

    const curNorm = ((rot % TWO_PI) + TWO_PI) % TWO_PI;
    let delta = ideal - curNorm;
    if (delta < 0) delta += TWO_PI;

    return rot + delta + 6 * TWO_PI;
}

// ── Ease animation ─────────────────────────────────────────────────
function animateTo(fromRot, toRot, ms, onDone) {
    cancelRAF();
    const t0 = performance.now(), delta = toRot - fromRot;
    (function frame(now) {
        let t = Math.min((now - t0) / ms, 1);
        t = 1 - Math.pow(1 - t, 4);   // quartic ease-out
        rot = fromRot + delta * t;
        drawFrame(rot);
        if (t < 1) { raf = requestAnimationFrame(frame); }
        else        { raf = null; rot = toRot; drawFrame(toRot); onDone(); }
    }(performance.now()));
}

// ── Particles ──────────────────────────────────────────────────────
function spawnParticles(n, emoji) {
    for (let i = 0; i < n; i++) {
        setTimeout(() => {
            const d = document.createElement('div');
            d.className   = 'particle';
            d.textContent = emoji;
            d.style.left  = (10 + Math.random() * 80) + 'vw';
            d.style.top   = (5  + Math.random() * 40) + 'vh';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 1200);
        }, i * 80);
    }
}

// ── UI helpers ─────────────────────────────────────────────────────
function setBtn(html, disabled) {
    const b = document.getElementById('spinBtn');
    b.innerHTML = html;
    b.disabled  = disabled;
}

function showErr(msg) {
    const el = document.getElementById('errBar');
    el.textContent = '⚠ ' + msg;
    el.classList.add('show');
}
function hideErr() { document.getElementById('errBar').classList.remove('show'); }

function showResult(prize, newCoins) {
    const panel = document.getElementById('resultPanel');
    const emoji = document.getElementById('rEmoji');
    const title = document.getElementById('rTitle');
    const sub   = document.getElementById('rSub');

    if (prize.type === 'nothing') {
        panel.className = 'result-panel show';
        emoji.textContent = '😔';
        title.textContent = 'No prize this time';
        sub.textContent   = 'Come back tomorrow for another spin!';
    } else if (prize.type === 'ampereplus') {
        panel.className = 'result-panel show jackpot';
        emoji.textContent = '⭐';
        title.textContent = 'Ampere+ Unlocked!';
        sub.textContent   = 'Premium membership is now active on your account!';
        spawnParticles(20, '⭐');
        spawnParticles(10, '✨');
    } else {
        panel.className = 'result-panel show win';
        emoji.textContent = prize.value >= 100 ? '🤑' : '💰';
        title.textContent = '+' + prize.value + ' Coins!';
        sub.textContent   = 'New balance: ' + (newCoins || 0).toLocaleString() + ' coins';
        spawnParticles(Math.min(Math.ceil(prize.value / 15) + 3, 18), '🪙');
    }

    if (newCoins !== undefined)
        document.getElementById('balVal').textContent = newCoins.toLocaleString() + ' coins';
}

// ── Cooldown ticker ────────────────────────────────────────────────
let _cooldownTimer = null;

function startCooldown(nextMs) {
    setBtn('<i class="fas fa-lock"></i> Come Back Tomorrow', true);
    const bar = document.getElementById('cooldownBar');
    bar.classList.add('show');

    if (_cooldownTimer) clearInterval(_cooldownTimer);
    function tick() {
        const left = Math.max(0, nextMs - Date.now());
        if (left === 0) {
            clearInterval(_cooldownTimer);
            bar.classList.remove('show');
            setBtn('<i class="fas fa-sync-alt"></i> Spin the Wheel', false);
            busy = false;
            runIdle();
            return;
        }
        const h = Math.floor(left / 3600000);
        const m = Math.floor((left % 3600000) / 60000);
        const s = Math.floor((left % 60000) / 1000);
        const p = n => String(n).padStart(2, '0');
        document.getElementById('cooldownTime').textContent = p(h) + 'h ' + p(m) + 'm ' + p(s) + 's';
    }
    tick();
    _cooldownTimer = setInterval(tick, 1000);
}

// ── Main spin flow ─────────────────────────────────────────────────
let claimToken = null;

async function doSpin() {
    if (busy) return;
    busy = true;
    cancelRAF();
    hideErr();
    document.getElementById('resultPanel').className = 'result-panel';
    document.getElementById('cooldownBar').classList.remove('show');
    canvas.classList.add('busy');
    setBtn('<span class="ring-loader"></span> Spinning…', true);

    // 1. Server rolls the prize
    let spinData;
    try {
        const res = await fetch('/api/spin-wheel', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({})
        });
        spinData = await res.json();

        if (!spinData.success) {
            canvas.classList.remove('busy');
            if (res.status === 429 && spinData.next_spin) {
                startCooldown(spinData.next_spin);
            } else {
                showErr(spinData.error || 'Could not spin. Try again.');
                setBtn('<i class="fas fa-sync-alt"></i> Spin the Wheel', false);
                busy = false;
                runIdle();
            }
            return;
        }
    } catch (e) {
        canvas.classList.remove('busy');
        showErr('Network error. Please try again.');
        setBtn('<i class="fas fa-sync-alt"></i> Spin the Wheel', false);
        busy = false;
        runIdle();
        return;
    }

    claimToken   = spinData.claim_token;
    const target = computeTarget(spinData.roll);

    // 2. Animate wheel
    animateTo(rot, target, 4500, async () => {
        canvas.classList.remove('busy');

        // 3. Claim prize
        try {
            const res = await fetch('/api/claim-spin', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ token: claimToken })
            });
            const d = await res.json();
            if (d.success) {
                showResult(d.prize, d.new_coins);
                if (d.next_spin) startCooldown(d.next_spin);
                fetch('/api/check-achievements', { method: 'POST' }).catch(() => {});
            } else {
                showErr(d.error || 'Claim failed. Contact support.');
            }
        } catch (e) {
            showErr('Network error claiming prize.');
        }

        setBtn('<i class="fas fa-check"></i> Come Back Tomorrow!', true);
    });
}

// ── Page init ──────────────────────────────────────────────────────
(async function init() {
    canvas.addEventListener('click', () => { if (!busy) doSpin(); });

    try {
        const r = await fetch('/api/get-user', { credentials: 'include' });
        if (!r.ok) { window.location.href = '/login.html'; return; }
        const d = await r.json();
        if (!d.success) { window.location.href = '/login.html'; return; }

        document.getElementById('balVal').textContent =
            (d.user.coins || 0).toLocaleString() + ' coins';

        const lastSpin = d.user.lastSpin || null;
        if (lastSpin) {
            const nextSpin = lastSpin + 24 * 60 * 60 * 1000;
            if (Date.now() < nextSpin) {
                busy = true;
                startCooldown(nextSpin);
                return;
            }
        }
    } catch (e) {
        console.error('Init error:', e);
    }
}());
</script>
