<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>Ampehere · 404 Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg:#060606; --surface:#0c0c0c; --border:#1a1a1a; --blue:#2563c4; --blue-hi:#3b7de0; --text:#d0d8e0; --text-muted:#8899aa; --text-dim:#556677; }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; border-radius:0 !important; }
        body { font-family:'Exo 2',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; text-align:center; }
        .code { font-size:5rem; font-weight:900; color:var(--border); line-height:1; margin-bottom:.5rem; letter-spacing:-.05em; }
        .title { font-size:1.1rem; font-weight:800; color:var(--text); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.5rem; }
        .desc { font-size:.82rem; color:var(--text-dim); max-width:340px; line-height:1.6; margin-bottom:1.75rem; }
        .btn { display:inline-flex; align-items:center; gap:.4rem; padding:.55rem 1.1rem; font-family:'Exo 2',sans-serif; font-size:.75rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; text-decoration:none; background:var(--blue); color:#fff; border:1px solid var(--blue); transition:background .12s; }
        .btn:hover { background:var(--blue-hi); color:#fff; text-decoration:none; }
        .footer { margin-top:2.5rem; font-size:.65rem; color:var(--text-dim); }
    </style>
</head>
<body>
    <div class="code">404</div>
    <div class="title">Page Not Found</div>
    <p class="desc">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn"><i class="fas fa-home"></i> Back to Ampehere</a>
    <div class="footer">© 2026 Ampehere</div>
</body>
</html>
