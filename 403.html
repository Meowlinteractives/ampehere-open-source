<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>Ampehere · 403 Access Denied</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg:#060606; --surface:#0c0c0c; --border:#1a1a1a; --blue:#2563c4; --blue-hi:#3b7de0; --text:#d0d8e0; --text-muted:#8899aa; --text-dim:#556677; --red:#c0392b; }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; border-radius:0 !important; }
        body { font-family:'Exo 2',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; text-align:center; }
        .code { font-size:5rem; font-weight:900; color:var(--border); line-height:1; margin-bottom:.5rem; letter-spacing:-.05em; }
        .title { font-size:1.1rem; font-weight:800; color:var(--text); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.5rem; }
        .desc { font-size:.82rem; color:var(--text-dim); max-width:340px; line-height:1.6; margin-bottom:1.75rem; }
        .actions { display:flex; gap:.65rem; flex-wrap:wrap; justify-content:center; }
        .btn { display:inline-flex; align-items:center; gap:.4rem; padding:.55rem 1.1rem; font-family:'Exo 2',sans-serif; font-size:.75rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; text-decoration:none; border:1px solid var(--border); color:var(--text-muted); background:var(--surface); transition:border-color .12s, color .12s; }
        .btn:hover { border-color:var(--blue); color:var(--text); text-decoration:none; }
        .btn.primary { background:var(--blue); border-color:var(--blue); color:#fff; }
        .btn.primary:hover { background:var(--blue-hi); border-color:var(--blue-hi); color:#fff; }
        .footer { margin-top:2.5rem; font-size:.65rem; color:var(--text-dim); }
    </style>
</head>
<body>
    <div class="code">403</div>
    <div class="title">Access Denied</div>
    <p class="desc">You don't have permission to view this page. Try logging in or heading back home.</p>
    <div class="actions">
        <a href="/" class="btn primary"><i class="fas fa-home"></i> Go Home</a>
        <a href="javascript:history.back()" class="btn"><i class="fas fa-arrow-left"></i> Go Back</a>
    </div>
    <div class="footer">© 2026 Ampehere</div>
</body>
</html>
