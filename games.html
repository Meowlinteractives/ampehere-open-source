<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png" type="image/png">
    <title>Ampehere · Games</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <style>
    /* === THEME OVERRIDE === */
    :root {
        --bg:#060606; --surface:#0c0c0c; --surface2:#0a0a0a;
        --border:#1a1a1a; --border-hi:#252525;
        --blue:#2563c4; --blue-hi:#3b7de0;
        --text:#d0d8e0; --text-muted:#8899aa; --text-dim:#556677;
        --red:#c0392b; --red-hover:#e74c3c; --red-dark:#922b21;
        --gold:#f1c40f; --green:#27ae60;
        --accent:#c0392b; --accent2:#8899aa;
    }
    *, *::before, *::after { border-radius: 0 !important; }
    body { background: #060606 !important; background-image: none !important; }
    a { color: #2563c4 !important; }
    a:hover { color: #3b7de0 !important; }
    </style>
    <style>
        :root {
            --bg:#060606; --surface:#0c0c0c; --border:#1a1a1a; --border-hi:#252525;
            --blue:#2563c4; --blue-hi:#3b7de0;
            --text:#d0d8e0; --text-muted:#8899aa; --text-dim:#556677;
            --red:#c0392b; --gold:#f1c40f; --green:#27ae60;
        }
        *, *::before, *::after { border-radius: 0 !important; }
        body { background: #060606 !important; background-image: none !important; }
        a { color: #2563c4; }
        a:hover { color: #3b7de0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/avatar-renderer.js"></script>
    <script src="/avatar2d.js"></script>
    <script src="/avatar.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow-x: hidden;
            font-family: 'Exo 2', sans-serif;
            background: #060606;
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(15,15,15,0.35) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 90%, rgba(126,184,212,0.10) 0%, transparent 50%);
            background-attachment: fixed;
            color: #d0d8e0;
            min-height: 100vh;
        }

        .main-content { padding: 1.5rem 1.5rem 1.5rem 0; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: linear-gradient(145deg, rgba(12,12,12,0.88), rgba(8,8,8,0.94));
            border: 1px solid rgba(37,99,196,0.2);
            border-radius: 0;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), ;
            animation: floatIn 0.5s ease-out;
        }

        @keyframes floatIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.75rem; padding-bottom: 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap; gap: 1rem;
        }
        .header h1 {
            font-family: 'Exo 2', sans-serif;
            font-size: 1.9rem; font-weight: 900;
            color: #d0d8e0; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 2px 20px rgba(37,99,196,0.18);
            display: flex; align-items: center; gap: 0.65rem;
        }
        .header h1 i { color: #8899aa; font-size: 1.6rem; }

        .header-actions { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }

        .btn {
            background: linear-gradient(135deg, rgba(15,15,15,0.7), rgba(12,12,12,0.9));
            border: 1px solid rgba(37,99,196,0.3);
            border-radius: 0;
            color: #8899aa;
            font-family: 'Exo 2', sans-serif;
            font-size: 0.82rem; font-weight: 800;
            letter-spacing: 0.06em; text-transform: uppercase;
            padding: 0.5rem 1.1rem;
            cursor: pointer; transition: all 0.15s;
            display: inline-flex; align-items: center; gap: 0.4rem;
            text-decoration: none;
        }
        .btn:hover { background: linear-gradient(135deg, rgba(15,15,15,0.95), rgba(12,12,12,1)); border-color: rgba(126,184,212,0.55); color: #e0f0ff; }
        .btn:active { transform: scale(0.97); }
        .btn.primary {
            background: linear-gradient(135deg, rgba(60,100,180,0.75), rgba(40,70,130,0.9));
            border-color: rgba(37,99,196,0.5); color: #c8e8ff;
        }

        .stat-pills { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .stat-pill {
            background: rgba(12,12,12,0.7);
            border: 1px solid rgba(126,184,212,0.18);
            border-radius: 0; padding: 0.4rem 1rem;
            font-size: 0.8rem; font-weight: 700; color: #8899aa;
            display: inline-flex; align-items: center; gap: 0.4rem;
        }

        .section {
            background: rgba(12,12,12,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 0; padding: 1.5rem;
            margin-bottom: 1.25rem;
        }
        .section-head {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem;
        }
        .section-head h2 {
            font-family: 'Exo 2', sans-serif;
            font-size: 1rem; font-weight: 800;
            color: #a0aabb; text-transform: uppercase; letter-spacing: 0.08em;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .section-head h2 i { color: #8899aa; font-size: 0.95rem; }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.85rem;
        }

        .game-card {
            background: rgba(8,8,8,0.5);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 0;
            padding: 1.1rem;
            cursor: pointer;
            transition: background 0.15s, transform 0.15s, border-color 0.15s;
            display: flex; flex-direction: column; gap: 0.55rem;
        }
        .game-card:hover { background: rgba(15,15,15,0.2); transform: translateY(-2px); border-color: rgba(126,184,212,0.25); }
        .game-card.pinned-card { border-color: rgba(255,200,50,0.4); background: rgba(20,18,5,0.6); }
        .game-card.locked-card { opacity: 0.55; border-color: rgba(220,80,80,0.35); }
        .game-card.locked-card > *:not(.owner-actions) { pointer-events: none; }
        .pin-badge { font-size: 0.6rem; color: #f0c040; background: rgba(80,60,0,0.5); border: 1px solid rgba(255,200,50,0.3); border-radius: 0; padding: 0.12rem 0.4rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; }
        .lock-badge { font-size: 0.6rem; color: #e05555; background: rgba(80,0,0,0.4); border: 1px solid rgba(220,80,80,0.3); border-radius: 0; padding: 0.12rem 0.4rem; font-weight: 800; }
        .vote-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.15rem; }
        .vote-btn { background: none; border: 1px solid rgba(126,184,212,0.18); border-radius: 0; color: #4a5a6a; font-size: 0.7rem; padding: 0.2rem 0.55rem; cursor: pointer; display: flex; align-items: center; gap: 0.3rem; transition: all 0.15s; }
        .vote-btn:hover { background: rgba(255,255,255,0.04); color: #8899aa; }
        .vote-btn.liked { background: rgba(50,180,100,0.2); border-color: rgba(50,180,100,0.5); color: #50c878; }
        .vote-btn.disliked { background: rgba(220,80,80,0.2); border-color: rgba(220,80,80,0.5); color: #e05555; }
        .owner-actions { display: flex; gap: 0.4rem; margin-top: 0.15rem; }
        .owner-btn { background: none; border: 1px solid rgba(37,99,196,0.18); border-radius: 0; color: #5a6880; font-size: 0.65rem; padding: 0.18rem 0.5rem; cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; transition: all 0.15s; }
        .owner-btn:hover { background: rgba(255,255,255,0.04); color: #8899aa; }
        .owner-btn.pin-active { color: #f0c040; border-color: rgba(255,200,50,0.4); }
        .owner-btn.lock-active { color: #e05555; border-color: rgba(220,80,80,0.4); }

        .game-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; }
        .game-skybox-badge {
            font-family: 'Exo 2', sans-serif; font-size: 0.58rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.1em;
            background: rgba(15,15,15,0.35); border: 1px solid rgba(37,99,196,0.18);
            border-radius: 0; padding: 0.15rem 0.45rem;
            color: #8899aa; flex-shrink: 0;
        }
        .game-title {
            font-family: 'Exo 2', sans-serif; font-size: 0.98rem; font-weight: 900;
            color: #d0d8e0; line-height: 1.2;
        }
        .game-desc {
            font-size: 0.72rem; color: #5a6880; line-height: 1.45;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .game-meta {
            display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
            margin-top: 0.2rem;
        }
        .game-meta span { font-size: 0.7rem; color: #4a5a6a; display: flex; align-items: center; gap: 0.28rem; }
        .game-meta span i { color: #3a4a5a; font-size: 0.7rem; }
        .game-meta .author { color: #6a8aa8; font-weight: 600; }
        .game-meta .online { color: #4a8a6a; font-weight: 700; }

        .play-btn {
            margin-top: auto;
            background: linear-gradient(135deg, rgba(15,15,15,0.55), rgba(12,12,12,0.8));
            border: 1px solid rgba(126,184,212,0.28); border-radius: 0;
            color: #8899aa; font-family: 'Exo 2', sans-serif;
            font-size: 0.75rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
            padding: 0.42rem 0.9rem; cursor: pointer; transition: all 0.15s;
            display: inline-flex; align-items: center; gap: 0.4rem; align-self: flex-start;
        }
        .play-btn:hover { background: linear-gradient(135deg, rgba(15,15,15,0.9), rgba(12,12,12,1)); border-color: rgba(37,99,196,0.5); color: #e0f0ff; }

        .empty-state { text-align: center; color: #4a5a6a; padding: 2.5rem; font-size: 0.88rem; }
        .empty-state i { font-size: 2rem; display: block; margin-bottom: 0.65rem; opacity: 0.4; }
        .loading-state { text-align: center; color: #5a6880; padding: 2rem; font-size: 0.88rem; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(126,184,212,0.25); border-radius: 0; }
    
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .header { flex-direction: column; align-items: flex-start; gap: .75rem; }
            .header h1 { font-size: 1.4rem; }
            .header-actions { width: 100%; }
            .header-actions input, .header-actions select { flex: 1; min-width: 0; }
            .games-grid { grid-template-columns: 1fr; }
            .filter-row { flex-wrap: wrap; gap: .5rem; }
            .filter-row select, .filter-row input { flex: 1; min-width: 120px; }
        }
        @media (max-width: 480px) {
            .game-card { padding: .85rem; }
            .header-actions { flex-direction: column; }
            .header-actions input, .header-actions select, .header-actions button { width: 100%; }
        }
    </style>
</head>
<body>
<script src="/sidebar.js"></script>
<div class="main-content">
<div class="container">

    <div class="header">
        <h1><i class="fas fa-gamepad"></i> Games</h1>
        <div class="header-actions">
            <a class="btn" href="/creator.html"><i class="fas fa-hammer"></i> Create a Game</a>
        </div>
    </div>

    <div class="stat-pills">
        <span class="stat-pill"><i class="fas fa-gamepad"></i> <span id="totalGames">—</span> Games</span>
        <span class="stat-pill"><i class="fas fa-play"></i> <span id="totalPlays">—</span> Total Plays</span>
        <span class="stat-pill"><i class="fas fa-users"></i> <span id="onlinePlayers">—</span> Playing Now</span>
    </div>

    <div class="section">
        <div class="section-head">
            <h2><i class="fas fa-fire"></i> All Games</h2>
        </div>
        <div class="games-grid" id="gameGrid">
            <div class="loading-state"><i class="fas fa-spinner spin"></i>&nbsp; Loading games…</div>
        </div>
    </div>

</div>
</div>

<script>
function esc(s) { return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function timeAgo(ts) {
    const d = Math.floor((Date.now()-ts)/86400000);
    if (d===0) return 'today'; if (d===1) return 'yesterday';
    if (d<30) return d+'d ago'; return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
const SKYBOX_ICONS = { none:'🌫', day:'☀️', sunset:'🌅', space:'🌌', nebula:'🔭', city:'🏙', storm:'⛈', desert:'🏜', underwater:'🌊', arctic:'❄️', volcano:'🌋' };
let _isOwner = false;
let _userId  = null;

async function load() {
    try {
        const res  = await fetch('/api/games/list?status=approved&page=0', { credentials: 'include' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'API error');
        const games = data.games || [];
        _isOwner = !!data.isOwner;
        _userId  = data.userId || null;
        document.getElementById('totalGames').textContent = games.length;
        const totalPlays = games.reduce((sum, g) => sum + (g.plays || 0), 0);
        document.getElementById('totalPlays').textContent = totalPlays.toLocaleString();
        if (!games.length) {
            document.getElementById('gameGrid').innerHTML = '<div class="empty-state"><i class="fas fa-gamepad"></i>No games yet — be the first to publish one!</div>';
            document.getElementById('onlinePlayers').textContent = '0';
            return;
        }
        // Pre-warm badge cache for all authors, store in _gameBadgeCache for renderGames
        window._gameBadgeCache = {};
        if (window.ampNameBadgeBatch) {
            await window.ampNameBadgeBatch([...new Set(games.map(g => g.author_name))]);
            for (const g of games) {
                window._gameBadgeCache[g.author_name] = (await window.ampNameBadge(g.author_name)) || '';
            }
        }
        renderGames(games);
        fetchPlayingNow(games.map(g => g.id));
    } catch(e) {
        document.getElementById('gameGrid').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i>Failed to load games</div>';
    }
}

async function fetchPlayingNow(gameIds) {
    try {
        const results = await Promise.all(
            gameIds.map(id =>
                fetch(`/api/games/multiplayer?gameId=${encodeURIComponent(id)}`, { credentials: 'include' })
                    .then(r => r.json()).catch(() => ({ players: [] }))
            )
        );
        const total = results.reduce((sum, r) => sum + (r.players || []).length, 0);
        document.getElementById('onlinePlayers').textContent = total;
    } catch {
        document.getElementById('onlinePlayers').textContent = '0';
    }
}

function renderGames(games) {
    document.getElementById('gameGrid').innerHTML = games.map(g => {
        const icon = SKYBOX_ICONS[g.skybox] || '🌫';
        const isPinned = !!g.pinned, isLocked = !!g.locked_game;
        const myVote = g.myVote || 0, likes = g.likes || 0, dislikes = g.dislikes || 0;
        const badges = [isPinned ? '<span class="pin-badge">📌 Pinned</span>' : '', isLocked ? '<span class="lock-badge">🔒 Locked</span>' : ''].filter(Boolean).join('');
        const canEdit = _isOwner || (_userId && _userId === g.author_id);
        const editBtn = canEdit ? `<button class="owner-btn" style="color:#8899aa;border-color:rgba(126,184,212,0.3)" onclick="editGame('${esc(g.id)}')">✏️ Edit</button>` : '';
        const ownerActions = (_isOwner || canEdit) ? `
            <div class="owner-actions" onclick="event.stopPropagation()">
                ${editBtn}
                ${_isOwner ? `<button class="owner-btn ${isPinned?'pin-active':''}" onclick="togglePin('${esc(g.id)}',${isPinned})">📌 ${isPinned?'Unpin':'Pin'}</button>
                <button class="owner-btn ${isLocked?'lock-active':''}" onclick="toggleLock('${esc(g.id)}',${isLocked})">🔒 ${isLocked?'Unlock':'Lock'}</button>
                <button class="owner-btn" style="color:#e05555;border-color:rgba(220,80,80,0.3)" onclick="deleteGame('${esc(g.id)}')">🗑 Delete</button>` : ''}
            </div>` : '';
        const reportBtn = (!_isOwner && _userId && _userId !== g.author_id) ? `<button onclick="event.stopPropagation();openReportModal({type:'game',targetId:'${esc(g.id)}',targetLabel:'${esc(g.title).replace(/'/g,"\\'")}'})" style="background:rgba(139,0,0,.18);border:1px solid rgba(200,80,80,.25);border-radius: 0;color:#cc7070;font-size:.65rem;font-weight:700;padding:3px 9px;cursor:pointer;"><i class='fas fa-flag'></i> Report</button>` : '';
        const _authorBadge = window._gameBadgeCache?.[g.author_name] || '';
        return `<div class="game-card ${isPinned?'pinned-card':''} ${isLocked?'locked-card':''}" id="card-${esc(g.id)}" onclick="${isLocked?'':("playGame('"+esc(g.id)+"')")}">
            <div class="game-card-top">
                <div><div class="game-title">${esc(g.title)}</div>${badges?`<div style="display:flex;gap:.3rem;margin-top:.25rem">${badges}</div>`:''}</div>
                <span class="game-skybox-badge">${icon} ${esc(g.skybox)}</span>
            </div>
            ${g.description?`<div class="game-desc">${esc(g.description)}</div>`:''}
            <div class="game-meta">
                <span class="author"><img id="av-${esc(g.id)}" width="18" height="18" style="border-radius:50%;vertical-align:middle;margin-right:3px;background:#111111;" alt="">${_authorBadge}${esc(g.author_name)}</span>
                <span><i class="fas fa-cube"></i>${g.block_count} blocks</span>
                <span><i class="fas fa-play"></i>${g.plays||0} plays</span>
                <span><i class="fas fa-clock"></i>${timeAgo(g.created_at)}</span>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-top:.1rem" onclick="event.stopPropagation()">
                <div class="vote-row">
                    <button class="vote-btn ${myVote===1?'liked':''}" id="like-${esc(g.id)}" onclick="vote('${esc(g.id)}',${myVote===1?0:1})"><i class="fas fa-thumbs-up"></i> <span id="likes-${esc(g.id)}">${likes}</span></button>
                    <button class="vote-btn ${myVote===-1?'disliked':''}" id="dislike-${esc(g.id)}" onclick="vote('${esc(g.id)}',${myVote===-1?0:-1})"><i class="fas fa-thumbs-down"></i> <span id="dislikes-${esc(g.id)}">${dislikes}</span></button>
                </div>
                <div style="display:flex;gap:.4rem;align-items:center">
                    ${reportBtn}
                    ${!isLocked?`<button class="play-btn" onclick="playGame('${esc(g.id)}')"><i class="fas fa-play"></i> Play</button>`:'<span style="font-size:.7rem;color:#e05555">Unavailable</span>'}
                </div>
            </div>
            ${ownerActions}
        </div>`;
    }).join('');

    // Render author avatars after DOM is ready
    function doRenderAvatars() {
        if (!window.AmpAvatar) { setTimeout(doRenderAvatars, 100); return; }
        games.forEach(g => {
            const img = document.getElementById(`av-${g.id}`);
            if (img) AmpAvatar.render(img, g.author_name, 18);
        });
    }
    doRenderAvatars();
}

function playGame(id) {
    // Optimistically bump the visible play count on the card before navigating
    const meta = document.querySelector(`#card-${id} .game-meta`);
    if (meta) {
        const playSpan = [...meta.querySelectorAll('span')].find(s => s.textContent.includes('plays'));
        if (playSpan) {
            const current = parseInt(playSpan.textContent) || 0;
            playSpan.innerHTML = `<i class="fas fa-play"></i>${(current + 1).toLocaleString()} plays`;
        }
    }
    window.location.href = '/game-player.html?id=' + encodeURIComponent(id);
}
function editGame(id) { window.location.href = '/creator.html?edit=' + encodeURIComponent(id); }

async function vote(gameId, v) {
    const res = await fetch('/api/games/vote', { method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({gameId, vote:v}) });
    const data = await res.json();
    if (!data.success) { if (res.status===401) Swal.fire({icon:'info',title:'Login required',text:'Log in to vote.'}); return; }
    document.getElementById(`likes-${gameId}`).textContent = data.likes;
    document.getElementById(`dislikes-${gameId}`).textContent = data.dislikes;
    const lb = document.getElementById(`like-${gameId}`), db = document.getElementById(`dislike-${gameId}`);
    lb.className = 'vote-btn' + (data.myVote===1?' liked':'');
    db.className = 'vote-btn' + (data.myVote===-1?' disliked':'');
    lb.setAttribute('onclick', `vote('${gameId}',${data.myVote===1?0:1})`);
    db.setAttribute('onclick', `vote('${gameId}',${data.myVote===-1?0:-1})`);
}

async function togglePin(gameId, cur) {
    const res = await fetch('/api/games/pin', { method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({gameId, pinned:!cur}) });
    const data = await res.json();
    if (data.success) load(); else Swal.fire({icon:'error',title:'Error',text:data.error});
}

async function toggleLock(gameId, cur) {
    const res = await fetch('/api/games/lock-game', { method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({gameId, locked:!cur}) });
    const data = await res.json();
    if (data.success) load(); else Swal.fire({icon:'error',title:'Error',text:data.error});
}

async function deleteGame(gameId) {
    const c = await Swal.fire({icon:'warning',title:'Delete World?',text:'Permanently deleted. Cannot be undone.',showCancelButton:true,confirmButtonText:'Delete',confirmButtonColor:'#e05555'});
    if (!c.isConfirmed) return;
    const res = await fetch('/api/games/delete', { method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({gameId}) });
    const data = await res.json();
    if (data.success) load(); else Swal.fire({icon:'error',title:'Error',text:data.error});
}

load();

// Show error toasted from game-player (e.g. world full redirect)
const _gameErr = sessionStorage.getItem('gameError');
if (_gameErr) { sessionStorage.removeItem('gameError'); Swal.fire({ icon: 'error', title: 'Could not join', text: _gameErr, timer: 4000, showConfirmButton: false }); }

// Refresh when user navigates back (e.g. after playing a game) — bfcache may restore stale page
window.addEventListener('pageshow', function(e) {
    if (e.persisted) load();
});
</script>
<script src="/report-modal.js"></script>
</body>
